name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the fields below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: "e.g. The CTX bar is not displayed when jq is installed."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Open Claude Code in a project directory
        2. Observe the statusline output
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Paste any error messages or unexpected output here.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: macOS Version
      description: Output of `sw_vers -productVersion`
      placeholder: "e.g. 14.5"
    validations:
      required: true

  - type: input
    id: claude_version
    attributes:
      label: Claude Code Version
      description: Output of `claude --version`
      placeholder: "e.g. 1.2.3"
    validations:
      required: false

  - type: input
    id: jq_version
    attributes:
      label: jq Version
      description: Output of `jq --version`
      placeholder: "e.g. jq-1.7"
    validations:
      required: true

  - type: input
    id: shell
    attributes:
      label: Shell
      description: Output of `echo $SHELL`
      placeholder: "e.g. /bin/zsh"
    validations:
      required: true
